version: '3.8'

services:
  backend:
    build: ./Backend
    container_name: klinikpemweb_backend
    ports:
      - "5000:5000"
    restart: always

  frontend:
    build: ./frontend
    container_name: klinikpemweb_frontend
    ports:
      - "80:3000"
    restart: always
    stdin_open: true # Agar React tidak langsung mati
    tty: true
